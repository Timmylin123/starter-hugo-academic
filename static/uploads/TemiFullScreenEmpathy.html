<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temi Robot Face - Empathy</title>

<style>
html, body {
  margin:0; padding:0;
  width:100%; height:100%;
  background:#cce0ff;
  display:flex; justify-content:center; align-items:center;
  overflow:hidden;
}

.face {
  position: relative;
  width: 90vw;
  max-width: 600px;
  aspect-ratio: 3 / 2;
}

.eye {
  position: absolute;
  width:170px;
  height:170px;
  background:black;
  border-radius:50%;
  overflow:hidden;
  transform-origin:center;
}

/* Preserve your original positioning */
.eye.left  { top:80px; left:-20px; }
.eye.right { top:80px; right:-20px; }

/* Big reflection */
.eye::after {
  content:"";
  position:absolute;
  top:30px;
  right:30px;
  width:24px;
  height:24px;
  background:white;
  border-radius:50%;
}

/* Sparkles */
.eye .sparkle {
  position:absolute;
  background:white;
  border-radius:50%;
  pointer-events:none;
  animation: twinkle 1.2s infinite alternate;
}

@keyframes twinkle {
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* Temi-safe blink animation */
.eye.blink {
  animation: blinkAnim 260ms ease-in-out;
}

@keyframes blinkAnim {
  0%   { transform: scaleY(1); }
  40%  { transform: scaleY(0.2); }
  60%  { transform: scaleY(0.2); }
  100% { transform: scaleY(1); }
}
</style>
</head>

<body>

<div class="face">
  <div class="eye left" id="eyeLeft"></div>
  <div class="eye right" id="eyeRight"></div>
</div>

<script>
const left = document.getElementById("eyeLeft");
const right = document.getElementById("eyeRight");

const BLINK = {
  meanSec: 2.3,
  stdSec: 2.0,
  doubleProb: 0.12,
  minIntervalSec: 0.5,
  maxIntervalSec: 8.0
};

// Create sparkles WITHOUT using clientHeight/clientWidth
function createSparkles(eye, count=6) {
  for(let i=0;i<count;i++){
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";

    const size = Math.floor(Math.random()*6)+5;

    // Use fixed 170px instead of clientHeight
    const top = Math.random()*(170 - size);
    const leftPos = Math.random()*(170 - size);

    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";
    sparkle.style.top = top + "px";
    sparkle.style.left = leftPos + "px";
    sparkle.style.animationDuration = (0.8 + Math.random()*0.8) + "s";

    eye.appendChild(sparkle);
  }
}

function blinkEye(eye){
  eye.classList.add("blink");
  setTimeout(()=> eye.classList.remove("blink"), 260);
}

function doBlink(){
  blinkEye(left);
  blinkEye(right);
}

function nextIntervalMs(){
  let sec = BLINK.meanSec + (Math.random()*2-1)*BLINK.stdSec;
  sec = Math.max(BLINK.minIntervalSec,
        Math.min(BLINK.maxIntervalSec, sec));
  return sec*1000;
}

function scheduleBlinkLoop(){
  setTimeout(()=>{
    doBlink();
    if(Math.random()<BLINK.doubleProb)
      setTimeout(doBlink,200);
    scheduleBlinkLoop();
  }, nextIntervalMs());
}

window.onload = function(){
  createSparkles(left,6);
  createSparkles(right,6);
  scheduleBlinkLoop();
};
</script>

</body>
</html>
