<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temi Robot Face - Empathy</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        background-color: #cce0ff;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .face {
        position: relative;
        width: 90vw;
        max-width: 600px;
        min-height: 320px;
        aspect-ratio: 3 / 2;
      }

      .eye {
        position: absolute;
        width: 170px;
        height: 170px;
        background: #000;
        border-radius: 50%;
        transition: transform 220ms ease-in-out;
        overflow: hidden;
      }

      .eye.left {
        top: 80px;
        left: -20px;
      }

      .eye.right {
        top: 80px;
        right: -20px;
      }

      .eye::after {
        content: "";
        position: absolute;
        top: 30px;
        right: 30px;
        width: 24px;
        height: 24px;
        background: #fff;
        border-radius: 50%;
      }

      .eye .sparkle {
        position: absolute;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 8px rgba(255, 255, 255, 0.9);
        opacity: 0.25;
        animation: twinkle 1.2s ease-in-out infinite;
      }

      .eye.blink {
        animation: blink 260ms ease-in-out;
      }

      @keyframes twinkle {
        0% {
          opacity: 0.2;
          transform: scale(0.85);
        }
        50% {
          opacity: 1;
          transform: scale(1.15);
        }
        100% {
          opacity: 0.25;
          transform: scale(0.9);
        }
      }

      @keyframes blink {
        0% {
          transform: scaleY(1);
        }
        40% {
          transform: scaleY(0.2);
        }
        60% {
          transform: scaleY(0.2);
        }
        100% {
          transform: scaleY(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="face" id="facebox">
      <div class="eye left" id="eyeLeft"></div>
      <div class="eye right" id="eyeRight"></div>
    </div>

    <script>
      var left = document.getElementById("eyeLeft");
      var right = document.getElementById("eyeRight");
      var blinkTimer = null;

      var BLINK = {
        meanSec: 2.3,
        stdSec: 2.0,
        doubleProb: 0.12,
        minIntervalSec: 0.5,
        maxIntervalSec: 8.0,
      };

      function createSparkles(eye, count) {
        for (var i = 0; i < count; i++) {
          var sparkle = document.createElement("div");
          var size = Math.floor(Math.random() * 6) + 5;

          sparkle.className = "sparkle";
          sparkle.style.width = size + "px";
          sparkle.style.height = size + "px";
          sparkle.style.left = Math.random() * (170 - size) + "px";
          sparkle.style.top = Math.random() * (170 - size) + "px";
          sparkle.style.animationDelay = Math.random() * 0.9 + "s";
          sparkle.style.animationDuration = 0.9 + Math.random() * 0.9 + "s";

          eye.appendChild(sparkle);
        }
      }

      function blinkEye(eye) {
        eye.classList.add("blink");
        setTimeout(function () {
          eye.classList.remove("blink");
        }, 260);
      }

      function doBlink() {
        blinkEye(left);
        blinkEye(right);
      }

      function nextIntervalMs() {
        var sec = BLINK.meanSec + (Math.random() * 2 - 1) * BLINK.stdSec;
        sec = Math.max(BLINK.minIntervalSec, Math.min(BLINK.maxIntervalSec, sec));
        return sec * 1000;
      }

      function scheduleBlinkLoop() {
        clearTimeout(blinkTimer);
        blinkTimer = setTimeout(function () {
          doBlink();
          if (Math.random() < BLINK.doubleProb) {
            setTimeout(doBlink, 200);
          }
          scheduleBlinkLoop();
        }, nextIntervalMs());
      }

      function resizeFullScreen() {
        document.body.style.height = window.innerHeight + "px";
      }

      function init() {
        createSparkles(left, 8);
        createSparkles(right, 8);
        scheduleBlinkLoop();
        resizeFullScreen();
      }

      window.addEventListener("resize", resizeFullScreen);
      window.addEventListener("load", init);

      window.eye = window.eye || {};
      window.eye.triggerBlinkNow = function () {
        doBlink();
      };
    </script>
  </body>
</html>
